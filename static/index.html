<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Home-screen / fullscreen hints for iOS when "Add to Home Screen" is used -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0f766e" />
    <title>BMT Teach-Back</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app__header">
        <div class="app__brand">BMT Teach-Back</div>
        <div class="app__subtitle">Knowledge Continuity Companion</div>
      </header>

      <main class="app__body">
        <section class="card">
          <div class="card__eyebrow">Your check-in</div>
          <h1 class="card__title">Personalized teach-back is coming soon</h1>
          <p class="card__text">
            This is the app skeleton. Next we'll load your questions from the
            visit and walk through them here.
          </p>
        </section>

        <button id="check" class="btn">Check connection</button>
        <p id="status" class="status" role="status"></p>
      </main>

      <footer class="app__footer">Abridge × Anthropic Hackathon</footer>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
